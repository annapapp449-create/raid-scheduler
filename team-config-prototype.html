<!--
  团队配置模块 — 交互原型（仅供视觉参考）
  
  ⚠️ 不要直接在项目中使用此文件！
  这是 vanilla HTML/JS 原型，仅用于在浏览器中打开查看交互效果。
  实际实现请严格按照 TEAM_COMP_SPEC.md 用 React + Tailwind 重写。
  
  用法：在浏览器中直接打开此文件，点击操作感受交互流程。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队配置模块 — 交互原型</title>
<style>
:root{--bg:#1a1a2e;--sf:#16213e;--sf2:#1f2f50;--bd:#2a3a5c;--tx:#e8e8e8;--mt:#8899aa;--gd:#ffd100;--gn:#00ff96;--rd:#ff4444;--or:#ff8c00;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);max-width:420px;margin:0 auto;padding:16px;}
.hd{text-align:center;margin-bottom:16px;}
.hd h1{font-size:18px;font-weight:500;color:var(--gd);letter-spacing:1px;}
.hd p{font-size:12px;color:var(--mt);margin-top:4px;}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.sh{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;}
.sh h2{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;}
.ri{font-size:14px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.ri-t{background:rgba(100,149,237,.2);color:#6495ED;}
.ri-h{background:rgba(0,255,150,.2);color:var(--gn);}
.ri-d{background:rgba(255,68,68,.2);color:var(--rd);}
.fo{font-size:11px;color:var(--mt);margin-left:4px;}
.stp{display:flex;align-items:center;}
.stp button{width:30px;height:30px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stp button:first-child{border-radius:5px 0 0 5px;}
.stp button:last-child{border-radius:0 5px 5px 0;}
.stp button:active{background:var(--bd);}
.stp .v{width:36px;height:30px;background:var(--bg);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:var(--gd);}
.ea{color:var(--mt);font-size:11px;transition:transform .2s;margin-left:10px;}
.ea.o{transform:rotate(180deg);}
.sp{padding:0 10px 10px;display:none;}
.sp.o{display:block;}
.sr{display:flex;align-items:center;gap:6px;padding:7px 2px;border-bottom:1px solid rgba(42,58,92,.4);}
.sr:last-child{border-bottom:none;}
.cd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sn{font-size:12px;flex:1;}
.pt{font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;user-select:none;white-space:nowrap;}
.pt-r{background:rgba(255,68,68,.2);color:#ff6666;}
.pt-p{background:rgba(255,209,0,.2);color:var(--gd);}
.pt-o{background:rgba(136,153,170,.15);color:var(--mt);}
.ss{display:flex;align-items:center;}
.ss button{width:24px;height:24px;border:1px solid var(--bd);background:var(--sf2);color:var(--mt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ss button:first-child{border-radius:4px 0 0 4px;}
.ss button:last-child{border-radius:0 4px 4px 0;}
.ss button:active{background:var(--bd);}
.ss .sv{width:26px;height:24px;background:var(--bg);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;}
.sum{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;}
.sum h3{font-size:13px;color:var(--mt);margin-bottom:10px;font-weight:400;}
.bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin-bottom:6px;}
.bs{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;transition:width .3s;min-width:0;}
.tl{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-top:6px;}
.tl .n{font-weight:500;}
.tl .ok{color:var(--gn);}
.tl .ov{color:var(--rd);}
.tl .un{color:var(--or);}
.wb{margin-top:8px;padding:7px 10px;border-radius:6px;font-size:11px;background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.3);color:var(--or);display:none;line-height:1.6;}
.wb.s{display:block;}
.tbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.tb{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--mt);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.tb:active,.tb.a{border-color:var(--gd);color:var(--gd);background:rgba(255,209,0,.08);}
.tb .x{font-size:10px;color:var(--rd);cursor:pointer;}
.save-row{display:flex;gap:6px;margin-bottom:12px;}
.save-btn{flex:1;padding:8px;border-radius:6px;border:1px solid var(--gd);background:rgba(255,209,0,.08);color:var(--gd);font-size:12px;font-weight:500;cursor:pointer;text-align:center;}
.save-btn:active{background:rgba(255,209,0,.2);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:10;}
.modal-overlay.s{display:flex;}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:20px;width:280px;}
.modal h3{font-size:14px;color:var(--gd);margin-bottom:12px;}
.modal input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:13px;outline:none;margin-bottom:12px;}
.modal input:focus{border-color:var(--gd);}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:8px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--bd);}
.mc{background:var(--sf2);color:var(--mt);}
.mo{background:rgba(255,209,0,.15);color:var(--gd);border-color:var(--gd) !important;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gn);color:#000;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;z-index:20;pointer-events:none;}
.toast.s{opacity:1;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="mbg">
  <div class="modal">
    <h3>保存为模板</h3>
    <input id="tpl-name" placeholder="模板名称，如：周三固定金团" maxlength="12"/>
    <div class="modal-btns">
      <button class="mc" id="m-cancel">取消</button>
      <button class="mo" id="m-ok">保存</button>
    </div>
  </div>
</div>

<div class="hd"><h1>团队配置</h1><p>设定你的25人团职业需求</p></div>
<div class="tbar" id="tbar"></div>
<div class="save-row"><div class="save-btn" id="save-btn">保存当前配置为模板</div></div>
<div id="roles"></div>
<div class="sum">
  <h3>配置概览</h3>
  <div class="bar" id="bar"></div>
  <div class="tl"><span>总人数</span><span class="n" id="tnum">25/25</span></div>
  <div class="wb" id="warn"></div>
</div>

<script>
const CC={warrior:'#C69B6D',paladin:'#F48CBA',hunter:'#AAD372',rogue:'#FFF468',priest:'#FFFFFF',shaman:'#0070DD',mage:'#3FC7EB',warlock:'#8788EE',druid:'#FF7C0A',dk:'#C41E3A'};
const SPECS={
  tank:[{id:'prot_warrior',name:'防战',cls:'warrior'},{id:'prot_paladin',name:'防骑',cls:'paladin'},{id:'blood_dk',name:'血DK',cls:'dk'},{id:'bear_druid',name:'熊德',cls:'druid'}],
  healer:[{id:'holy_paladin',name:'奶骑',cls:'paladin'},{id:'disc_priest',name:'戒律',cls:'priest'},{id:'holy_priest',name:'神牧',cls:'priest'},{id:'resto_shaman',name:'奶萨',cls:'shaman'},{id:'resto_druid',name:'奶德',cls:'druid'}],
  dps:[{id:'fury_warrior',name:'狂暴战',cls:'warrior'},{id:'arms_warrior',name:'武器战',cls:'warrior'},{id:'ret_paladin',name:'惩戒骑',cls:'paladin'},{id:'bm_hunter',name:'兽王猎',cls:'hunter'},{id:'mm_hunter',name:'射击猎',cls:'hunter'},{id:'sv_hunter',name:'生存猎',cls:'hunter'},{id:'assa_rogue',name:'刺杀贼',cls:'rogue'},{id:'combat_rogue',name:'战斗贼',cls:'rogue'},{id:'sub_rogue',name:'敏锐贼',cls:'rogue'},{id:'shadow_priest',name:'暗牧',cls:'priest'},{id:'ele_shaman',name:'元素萨',cls:'shaman'},{id:'enh_shaman',name:'增强萨',cls:'shaman'},{id:'arcane_mage',name:'奥法',cls:'mage'},{id:'fire_mage',name:'火法',cls:'mage'},{id:'frost_mage',name:'冰法',cls:'mage'},{id:'affliction_lock',name:'痛苦术',cls:'warlock'},{id:'demo_lock',name:'恶魔术',cls:'warlock'},{id:'destro_lock',name:'毁灭术',cls:'warlock'},{id:'moonkin',name:'鸟德',cls:'druid'},{id:'feral_druid',name:'猫德',cls:'druid'},{id:'unholy_dk',name:'邪DK',cls:'dk'},{id:'frost_dk',name:'冰DK',cls:'dk'}]
};
const ROLES=[{key:'tank',label:'坦克',icon:'🛡',ic:'ri-t',min:1,max:4,def:3},{key:'healer',label:'治疗',icon:'✚',ic:'ri-h',min:2,max:8,def:4},{key:'dps',label:'输出',icon:'⚔',ic:'ri-d',min:0,max:23,def:18}];
const PRESET={name:'金团标配',tank:3,healer:4,dps:18,specs:{},pri:{}};

let customs=[];
let st={tank:3,healer:4,dps:18,exp:{},sc:{},sp:{}};
let actIdx=-1;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),1500);}
function apply(t){st.tank=t.tank;st.healer=t.healer;st.dps=t.dps;st.sc={...(t.specs||{})};st.sp={...(t.pri||{})};Object.keys(t.specs||{}).forEach(k=>{if(!st.sp[k]&&t.specs[k]>0)st.sp[k]='preferred';});}

function renderTbar(){
  const c=document.getElementById('tbar');c.innerHTML='';
  const all=[{...PRESET,idx:0,cust:false},...customs.map((p,i)=>({...p,idx:i+1,cust:true,ci:i}))];
  all.forEach(t=>{
    const b=document.createElement('span');
    b.className='tb'+(t.idx===actIdx?' a':'');
    if(t.cust){
      b.innerHTML=t.name+' <span class="x">✕</span>';
      b.querySelector('.x').addEventListener('click',e=>{e.stopPropagation();customs.splice(t.ci,1);if(actIdx===t.idx)actIdx=-1;renderTbar();});
    } else b.textContent=t.name;
    b.addEventListener('click',()=>{actIdx=t.idx;apply(t);render();renderTbar();});
    c.appendChild(b);
  });
}

function render(){
  const rc=document.getElementById('roles');rc.innerHTML='';
  ROLES.forEach(role=>{
    const s=document.createElement('div');s.className='sec';
    const isO=st.exp[role.key];
    const spT=SPECS[role.key].reduce((a,x)=>a+(st.sc[x.id]||0),0);
    const flex=Math.max(0,st[role.key]-spT);
    s.innerHTML=`
      <div class="sh" data-r="${role.key}">
        <h2><span class="ri ${role.ic}">${role.icon}</span>${role.label}<span class="fo">${spT>0?'(指定'+spT+' 开放'+flex+')':''}</span></h2>
        <div style="display:flex;align-items:center;">
          <div class="stp"><button data-a="d" data-r="${role.key}">−</button><div class="v">${st[role.key]}</div><button data-a="i" data-r="${role.key}">+</button></div>
          <span class="ea ${isO?'o':''}">▼</span>
        </div>
      </div>
      <div class="sp ${isO?'o':''}" id="p-${role.key}">
        ${SPECS[role.key].map(sp=>{
          const cnt=st.sc[sp.id]||0;
          const pri=st.sp[sp.id]||'open';
          const pc=pri==='required'?'pt-r':pri==='preferred'?'pt-p':'pt-o';
          const pl=pri==='required'?'必须':pri==='preferred'?'优先':'可选';
          return `<div class="sr">
            <span class="cd" style="background:${CC[sp.cls]}"></span>
            <span class="sn" style="color:${CC[sp.cls]}">${sp.name}</span>
            ${cnt>0?`<span class="pt ${pc}" data-s="${sp.id}">${pl}</span>`:''}
            <div class="ss"><button data-sa="d" data-s="${sp.id}" data-r="${role.key}">−</button><div class="sv">${cnt}</div><button data-sa="i" data-s="${sp.id}" data-r="${role.key}">+</button></div>
          </div>`;
        }).join('')}
      </div>`;
    rc.appendChild(s);
  });
  rc.querySelectorAll('.sh').forEach(el=>{el.addEventListener('click',e=>{if(e.target.closest('.stp'))return;st.exp[el.dataset.r]=!st.exp[el.dataset.r];render();});});
  rc.querySelectorAll('.stp button').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const r=ROLES.find(x=>x.key===b.dataset.r);if(b.dataset.a==='i'&&st[r.key]<r.max)st[r.key]++;if(b.dataset.a==='d'&&st[r.key]>r.min)st[r.key]--;actIdx=-1;render();renderTbar();});});
  rc.querySelectorAll('.ss button').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const sp=b.dataset.s,rk=b.dataset.r,cur=st.sc[sp]||0;if(b.dataset.sa==='i'){const t=SPECS[rk].reduce((a,x)=>a+(st.sc[x.id]||0),0);if(t<st[rk]){st.sc[sp]=cur+1;if(!st.sp[sp])st.sp[sp]='preferred';}}if(b.dataset.sa==='d'&&cur>0){st.sc[sp]=cur-1;if(cur-1===0)delete st.sp[sp];}actIdx=-1;render();renderTbar();});});
  rc.querySelectorAll('.pt').forEach(t=>{t.addEventListener('click',e=>{e.stopPropagation();const cy={required:'preferred',preferred:'open',open:'required'};st.sp[t.dataset.s]=cy[st.sp[t.dataset.s]||'open'];actIdx=-1;render();renderTbar();});});

  const total=st.tank+st.healer+st.dps;
  document.getElementById('bar').innerHTML=[
    {l:`坦 ${st.tank}`,p:st.tank/25*100,c:'#6495ED'},
    {l:`奶 ${st.healer}`,p:st.healer/25*100,c:'#00ff96'},
    {l:`DPS ${st.dps}`,p:st.dps/25*100,c:'#ff4444'},
  ].map(s=>`<div class="bs" style="width:${s.p}%;background:${s.c}33;color:${s.c}">${s.l}</div>`).join('');
  const tn=document.getElementById('tnum');tn.textContent=`${total}/25`;tn.className='n '+(total===25?'ok':total>25?'ov':'un');
  const w=document.getElementById('warn'),ws=[];
  let hasBL=false;['resto_shaman','enh_shaman','ele_shaman','fire_mage','arcane_mage','frost_mage'].forEach(s=>{if(st.sc[s])hasBL=true;});
  if(Object.values(st.exp).some(v=>v)&&!hasBL&&Object.values(st.sc).some(v=>v>0))ws.push('缺少嗜血/英勇 — 建议加萨满或法师');
  if(total!==25)ws.push(`当前${total}人，${total>25?'超出':'不足'}${Math.abs(25-total)}人`);
  if(ws.length){w.innerHTML=ws.join('<br>');w.classList.add('s');}else w.classList.remove('s');
}

document.getElementById('save-btn').addEventListener('click',()=>{
  if(customs.length>=5){toast('最多保存5个自定义模板');return;}
  document.getElementById('mbg').classList.add('s');
  const inp=document.getElementById('tpl-name');inp.value='';setTimeout(()=>inp.focus(),100);
});
document.getElementById('m-cancel').addEventListener('click',()=>document.getElementById('mbg').classList.remove('s'));
document.getElementById('m-ok').addEventListener('click',()=>{
  const name=document.getElementById('tpl-name').value.trim();
  if(!name){toast('请输入模板名称');return;}
  customs.push({name,tank:st.tank,healer:st.healer,dps:st.dps,specs:{...st.sc},pri:{...st.sp}});
  actIdx=customs.length;
  document.getElementById('mbg').classList.remove('s');
  renderTbar();render();toast('模板已保存');
});
document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')e.target.classList.remove('s');});

renderTbar();render();
</script>
</body>
</html>
